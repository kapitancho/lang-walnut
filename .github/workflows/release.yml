name: Release

on:
  push:
    tags:
      - 'v1*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, bcmath
          tools: composer, box

      - name: Install dependencies (without dev)
        run: composer install --no-dev --optimize-autoloader

      - name: Generate version from git tag
        run: |
          VERSION="${{ github.ref }}"
          VERSION="${VERSION#refs/tags/v}"
          echo "$VERSION" > VERSION
          echo "Building version: $VERSION"

      - name: Build PHAR (Almond engine, includes core-nut-lib)
        run: box compile

      - name: Upload PHAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-build
          path: build/walnut.phar
          retention-days: 7

  create-release:
    needs: build-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download PHAR
        uses: actions/download-artifact@v4
        with:
          name: release-build
          path: release-assets

      - name: Make PHAR executable
        run: chmod +x release-assets/walnut.phar

      - name: Calculate SHA256 and update Homebrew formula
        run: |
          VERSION="${{ github.ref }}"
          VERSION="${VERSION#refs/tags/v}"

          SHA256=$(shasum -a 256 release-assets/walnut.phar | awk '{print $1}')

          echo "Version: $VERSION"
          echo "SHA256: $SHA256"

          sed -i "s/version \".*\"/version \"$VERSION\"/" Formula/walnut.rb
          sed -i "s/sha256 \".*\"/sha256 \"$SHA256\"/" Formula/walnut.rb

          cat Formula/walnut.rb

      - name: Commit updated formula
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Formula/walnut.rb
          git commit -m "chore: update Homebrew formula for release ${{ github.ref }}" || echo "No changes to commit"

      - name: Push updated formula
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/walnut.phar
          draft: false
          prerelease: false
          body: |
            ## Installation

            ### Standalone CLI (PHP required)

            ```bash
            # Install globally
            curl -L https://github.com/walnut-lang/walnut/releases/download/${{ github.ref_name }}/walnut.phar \
              -o /usr/local/bin/walnut
            chmod +x /usr/local/bin/walnut

            # Create a new project
            mkdir my-project && cd my-project
            walnut init

            # Use it
            walnut cli main
            walnut test
            walnut analyse
            walnut serve
            ```

            The PHAR is self-contained — `walnut init` extracts the standard library
            and writes `nutcfg.json` into your project directory.

            ### Via Homebrew

            ```bash
            brew tap walnut-lang/walnut
            brew install walnut
            walnut init
            ```
